<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="interactive social media web application where users can add and remove photos"
		/>
		<meta name="author" content="Sofia Villazon" />
		<meta name="keywords" content="Social media, Photos, Share" />
		<title>Spots</title>
		<link rel="stylesheet" href="./pages/index.css" />
		<link rel="icon" href="./favicon.ico" />
	</head>
	<body>
		<div class="page">
			<header class="header">
				<img
					src="./images/Spots_logo.png"
					alt="Spotss logo"
					class="header__logo"
				/>
			</header>
			<main class="content">
				<section class="profile">
					<div class="profile__content">
						<div class="profile__avatar">
							<img
								src="./images/avatar.jpg"
								alt="avatar profile's photo"
								class="profile__photo"
							/>
							<div class="profile__avatar-text">
								<div>
									<h1 class="profile__name">Bessie Coleman</h1>
									<p class="profile__description">Civil aviator</p>
								</div>

								<button class="profile__button">
									<svg
										class="profile__button-icon"
										xmlns="http://www.w3.org/2000/svg"
										width="16"
										height="16"
										fill="none"
									>
										<path
											fill="#212121"
											d="M13.067 4.875 4.83 13.114 2.556 10.84l8.239-8.238zM14.204 1.466a1.607 1.607 0 0 1 0 2.273l-.569.568-2.272-2.273.568-.568a1.607 1.607 0 0 1 2.273 0ZM1.54 13.484l1.017-2.643 2.272 2.272-2.643 1.017a.5.5 0 0 1-.646-.646Z"
										/>
									</svg>
									Edit Profile
								</button>
							</div>
						</div>
						<button class="profile__post-button">
							<svg
								xmlns="http://www.w3.org/2000/svg"
								width="14"
								height="14"
								fill="none"
							>
								<path
									stroke="#FCF5E5"
									stroke-linecap="round"
									stroke-width="2"
									d="M1 7h12M7 13V1"
								/>
							</svg>
							New Post
						</button>
					</div>
				</section>
				<section class="cards">
					<div class="cards__grid">
						<div class="card">
							<img
								src="./images/1-photo-by-moritz-feldmann-from-pexels.jpg"
								alt="Val Thorens image"
								class="card__image"
							/>
							<div class="card__content">
								<h2 class="card__title">Val Thorens</h2>
								<button class="card__like-button" type="button"></button>
							</div>
						</div>
						<div class="card">
							<img
								src="./images/2-photo-by-ceiline-from-pexels.jpg"
								alt="Restaurant terrace image"
								class="card__image"
							/>
							<div class="card__content">
								<h2 class="card__title">Restaurant terrace</h2>
								<button class="card__like-button" type="button"></button>
							</div>
						</div>
						<div class="card">
							<img
								src="./images/3-photo-by-tubanur-dogan-from-pexels.jpg"
								alt="Outdoor cafe image"
								class="card__image"
							/>
							<div class="card__content">
								<h2 class="card__title">An outdoor cafe</h2>
								<button class="card__like-button" type="button"></button>
							</div>
						</div>
						<div class="card">
							<img
								src="./images/4-photo-by-maurice-laschet-from-pexels.jpg"
								alt="Long bridge image"
								class="card__image"
							/>
							<div class="card__content">
								<h2 class="card__title">
									A very long bridge, over the forest that leads into the
									biggest mountain in Ulala.
								</h2>
								<button class="card__like-button" type="button"></button>
							</div>
						</div>
						<div class="card">
							<img
								src="./images/5-photo-by-van-anh-nguyen-from-pexels.jpg"
								alt="Tunnel image"
								class="card__image"
							/>

							<div class="card__content">
								<h2 class="card__title">Tunnel with morning light</h2>
								<button class="card__like-button" type="button"></button>
							</div>
						</div>
						<div class="card">
							<img
								src="./images/6-photo-by-moritz-feldmann-from-pexels.jpg"
								alt="Mountain image"
								class="card__image"
							/>
							<div class="card__content">
								<h2 class="card__title">Mountain house</h2>
								<button class="card__like-button" type="button"></button>
							</div>
						</div>
					</div>
				</section>
			</main>
			<footer class="footer">
				<p class="footer__copyright">2025 &copy; Sofia Villazon</p>
			</footer>
		</div>
	</body>
</html>
